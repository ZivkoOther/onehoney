<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIBet</title>
</head>
<body>
  <h1>Why are you gay?</h1>

  <button id="ricky" type="button">
    "Who said I am gay?"
  </button>

  <div id="player"></div>

  <script>
    const rickyboy = document.getElementById('ricky');
    const player = document.getElementById('player');

    rickyboy.addEventListener('click', function () {
      player.innerHTML = `
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
          title="YouTube video player"
          frameborder="0"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      `;
    });
  </script>
</body>
</html>
